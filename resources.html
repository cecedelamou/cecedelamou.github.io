<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>Resources | Cece Cherif Delamou</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #161616;
      --accent: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --sidebar-width: 280px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
      margin: 0; padding: 0;
      background: var(--bg);
      color: white;
      font-family: 'Inter', sans-serif;
      height: 100%;
      width: 100%;
      overflow: hidden; /* Prevents the whole page from bouncing */
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
      transition: transform 0.3s ease;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 20;
    }

    .app-container.collapsed .sidebar {
      margin-left: calc(-1 * var(--sidebar-width));
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 2px;
      margin: 0;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .resource-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      margin: 0;
      list-style: none;
    }

    .resource-item {
      padding: 14px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.2s;
    }

    .resource-item.active { background: white; color: black; font-weight: 600; }

    /* Main Content Area */
    .viewer-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      min-width: 0; /* Important for flex child scaling */
    }

    .control-bar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .toggle-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .doc-title {
      margin-left: 16px;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* PDF Container - Fixed for Mobile Scrolling */
    .pdf-wrapper {
      flex: 1;
      width: 100%;
      height: 100%;
      overflow: auto; /* Allows independent scrolling */
      -webkit-overflow-scrolling: touch; /* Forces smooth momentum scroll on iOS */
      background: #1e1e1e;
    }

    object, embed, iframe {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 768px) {
      :root { --sidebar-width: 100%; }
      .app-container.collapsed .sidebar { margin-left: -100%; }
      .sidebar { position: fixed; height: 100%; }
    }
  </style>
</head>
<body>

  <div class="app-container" id="app">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Resources</h1>
      </div>
      <ul class="resource-list">
        <li class="resource-item active" onclick="loadPDF('Resource1.pdf', 'Resource 1', this)">
          <i class="fa-solid fa-file-pdf"></i>
          <span>Resource 1</span>
        </li>
      </ul>
    </aside>

    <main class="viewer-main">
      <div class="control-bar">
        <button class="toggle-btn" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars" id="toggleIcon"></i>
        </button>
        <div class="doc-title" id="currentDocTitle">Resource 1</div>
      </div>

      <div class="pdf-wrapper" id="pdfContainer">
        <object id="pdfObject" data="Resource1.pdf#view=FitH&scrollbar=1&toolbar=1" type="application/pdf">
            <p>Your browser does not support PDFs. <a href="Resource1.pdf">Download instead.</a></p>
        </object>
      </div>
    </main>

  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('app').classList.toggle('collapsed');
    }

    function loadPDF(file, title, element) {
      const container = document.getElementById('pdfContainer');
      const titleDisplay = document.getElementById('currentDocTitle');
      
      // We recreate the object to force a clean reload and reset the scroll position
      container.innerHTML = `<object id="pdfObject" data="${file}#view=FitH&scrollbar=1&toolbar=1" type="application/pdf">
          <p>Unable to display PDF. <a href="${file}">Download instead.</a></p>
      </object>`;
      
      titleDisplay.innerText = title;

      document.querySelectorAll('.resource-item').forEach(item => item.classList.remove('active'));
      element.classList.add('active');

      if (window.innerWidth <= 768) {
        toggleSidebar();
      }
    }
  </script>
</body>
</html>
