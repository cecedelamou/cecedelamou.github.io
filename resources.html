<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>Resources | Cece Cherif Delamou</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #161616;
      --accent: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --sidebar-width: 280px;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
      margin: 0; padding: 0;
      background: var(--bg);
      color: white;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .app-container { display: flex; height: 100vh; width: 100vw; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: margin-left 0.3s ease;
    }

    .app-container.collapsed .sidebar { margin-left: calc(-1 * var(--sidebar-width)); }

    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 12px; font-family: var(--font-mono); letter-spacing: 2px; margin: 0; color: var(--text-dim); text-transform: uppercase; }

    .resource-list { flex: 1; overflow-y: auto; padding: 12px; margin: 0; list-style: none; }
    .resource-item { padding: 14px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
    .resource-item.active { background: white; color: black; font-weight: 600; }

    /* Viewer Area */
    .viewer-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
      min-width: 0;
    }

    .control-bar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      justify-content: space-between;
    }

    .nav-group { display: flex; align-items: center; gap: 10px; }
    .toggle-btn, .zoom-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    /* Editable Page Navigation */
    .page-nav-container {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    #page-input {
      width: 45px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: white;
      text-align: center;
      padding: 4px;
      border-radius: 4px;
      font-family: var(--font-mono);
      outline: none;
    }

    #page-input:focus { border-color: rgba(255,255,255,0.4); }

    /* Remove arrows from number input */
    #page-input::-webkit-outer-spin-button,
    #page-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* Canvas & Arrows */
    .viewport {
      flex: 1;
      position: relative;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
      background: #111;
    }

    canvas { box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 100%; }

    .arrow {
      position: absolute;
      top: 56px; bottom: 0;
      width: 15%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      color: rgba(255,255,255,0.2);
      font-size: 40px;
      transition: all 0.3s;
    }
    .arrow:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
    .arrow.left { left: 0; }
    .arrow.right { right: 0; }

    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: var(--font-mono); color: var(--text-dim);
    }

    @media (max-width: 768px) {
      :root { --sidebar-width: 100%; }
      .sidebar { position: fixed; height: 100%; }
      .arrow { width: 25%; font-size: 30px; }
      .page-label-text { display: none; } /* Hide "Page" text on mobile to save space */
    }
  </style>
</head>
<body>

  <div class="app-container" id="app">
    
    <aside class="sidebar">
      <div class="sidebar-header"><h1>Library</h1></div>
      <ul class="resource-list">
        <li class="resource-item active" onclick="changePDF('Resource0.pdf', this)">
          <i class="fa-solid fa-file-pdf"></i>
          <span>Resource 0</span>
        </li>
        <li class="resource-item active" onclick="changePDF('Resource1.pdf', this)">
          <i class="fa-solid fa-file-pdf"></i>
          <span>Resource 1</span>
        </li>
      </ul>
    </aside>

    <main class="viewer-main">
      <div class="control-bar">
        <div class="nav-group">
          <button class="toggle-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
          
          <div class="page-nav-container">
            <span class="page-label-text">Page</span>
            <input type="number" id="page-input" value="1" min="1" onchange="handlePageInput(this.value)">
            <span id="page-total-display">/ 0</span>
          </div>
        </div>

        <div class="nav-group">
          <button class="zoom-btn" onclick="zoomOut()"><i class="fa-solid fa-minus"></i></button>
          <button class="zoom-btn" onclick="zoomIn()"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>

      <div class="viewport" id="viewport">
        <div id="loading">Loading...</div>
        <canvas id="pdf-canvas"></canvas>
        
        <div class="arrow left" onclick="prevPage()"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="arrow right" onclick="nextPage()"><i class="fa-solid fa-chevron-right"></i></div>
      </div>
    </main>

  </div>

  <script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null,
        pageNum = 1,
        pageRendering = false,
        pageNumPending = null,
        scale = 1.2,
        canvas = document.getElementById('pdf-canvas'),
        ctx = canvas.getContext('2d');

    function renderPage(num) {
      pageRendering = true;
      pdfDoc.getPage(num).then((page) => {
        const viewportContainer = document.getElementById('viewport');
        const unscaledViewport = page.getViewport({scale: 1});
        const autoScale = (viewportContainer.clientWidth * 0.9) / unscaledViewport.width;
        
        const viewport = page.getViewport({scale: autoScale * scale});
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = { canvasContext: ctx, viewport: viewport };
        const renderTask = page.render(renderContext);

        renderTask.promise.then(() => {
          pageRendering = false;
          document.getElementById('loading').style.display = 'none';
          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });
      });

      // Update the input field and total count
      document.getElementById('page-input').value = num;
      document.getElementById('page-total-display').textContent = `/ ${pdfDoc.numPages}`;
    }

    function queueRenderPage(num) {
      if (pageRendering) { pageNumPending = num; } 
      else { renderPage(num); }
    }

    function handlePageInput(value) {
      const num = parseInt(value);
      if (num >= 1 && num <= pdfDoc.numPages) {
        pageNum = num;
        queueRenderPage(pageNum);
      } else {
        // Reset to current page if invalid
        document.getElementById('page-input').value = pageNum;
      }
    }

    function prevPage() { if (pageNum <= 1) return; pageNum--; queueRenderPage(pageNum); }
    function nextPage() { if (pageNum >= pdfDoc.numPages) return; pageNum++; queueRenderPage(pageNum); }
    function zoomIn() { scale += 0.2; queueRenderPage(pageNum); }
    function zoomOut() { if (scale > 0.4) scale -= 0.2; queueRenderPage(pageNum); }

    function loadPDF(url) {
      document.getElementById('loading').style.display = 'block';
      pdfjsLib.getDocument(url).promise.then((pdfDoc_) => {
        pdfDoc = pdfDoc_;
        pageNum = 1;
        renderPage(pageNum);
      });
    }

    function changePDF(url, el) {
      document.querySelectorAll('.resource-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      loadPDF(url);
      if (window.innerWidth <= 768) toggleSidebar();
    }

    function toggleSidebar() { document.getElementById('app').classList.toggle('collapsed'); }

    loadPDF('Resource0.pdf');
    window.addEventListener('resize', () => { if(pdfDoc) queueRenderPage(pageNum); });

    // Keyboard Navigation
window.addEventListener('keydown', (e) => {
  // Ignore keyboard events if the user is typing in the page number input
  if (document.activeElement.id === 'page-input') return;

  if (e.key === 'ArrowLeft') {
    prevPage();
  } else if (e.key === 'ArrowRight') {
    nextPage();
  }
});
  </script>
</body>
</html>
